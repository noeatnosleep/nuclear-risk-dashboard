<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nuclear Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: system-ui;
    background: #0b1220;
    color: #e5e7eb;
    margin: 0;
}
.container {
    max-width: 980px;
    margin: auto;
    padding: 24px;
}
h1 { text-align: center; }
.risk {
    text-align: center;
    font-size: 4.5rem;
    font-weight: 700;
    margin: 10px 0;
}
.low { color: #22c55e; }
.medium { color: #f59e0b; }
.high { color: #ef4444; }
.updated {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 8px;
}
.submeta {
    text-align: center;
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 28px;
}
.section { margin-top: 40px; }
.chart-container {
    background: #111827;
    border-radius: 12px;
    padding: 16px;
    height: 260px;
    position: relative;
}
.controls {
    background: #111827;
    border-radius: 10px;
    padding: 12px;
    margin-top: 8px;
}
.controls label {
    font-size: 0.85rem;
    color: #cbd5e1;
}
canvas {
    width: 100% !important;
    height: 100% !important;
}
.card {
    background: #162033;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 12px;
}
.card a {
    color: #60a5fa;
    text-decoration: none;
}
.meta {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-top: 5px;
}
.footer {
    margin-top: 50px;
    text-align: center;
    font-size: 0.85rem;
    color: #64748b;
}
.build {
    margin-top: 12px;
    font-size: 0.75rem;
    color: #64748b;
}
</style>
</head>
<body>
<div class="container">
<h1>Global Nuclear Risk</h1>
<div id="risk" class="risk">--%</div>
<div id="updated" class="updated"></div>
<div id="submeta" class="submeta"></div>

<div class="controls">
  <label for="bandMode">Risk color mode: </label>
  <select id="bandMode">
    <option value="relative">Relative to recent history (default)</option>
    <option value="absolute">Fixed thresholds (low/medium/high)</option>
  </select>
  <button id="resetPrefs" type="button">Reset preferences</button>
</div>

<div class="section">
    <h2>Trend</h2>
    <div class="chart-container"><canvas id="chart"></canvas></div>
</div>
<div class="section">
    <h2>Top Drivers</h2>
    <div id="drivers"></div>
</div>
<div class="section">
    <h2>Debug</h2>
    <div id="debug" class="card"></div>
</div>
<div class="footer">
    Signal-based model using global news inputs. Not predictive financial/safety advice.<br><br>
    Contact: <a href="mailto:noeatnosleep@pm.me" style="color:#60a5fa;">noeatnosleep@pm.me</a>
    <div id="build" class="build">Build: loading...</div>
</div>
</div>
<script>
window.__riskChart = null;
const STORAGE_KEY = "nuclear-risk-dashboard:band-mode";

function getHistoryRows(historyPayload) {
    if (Array.isArray(historyPayload)) return historyPayload;
    if (historyPayload && Array.isArray(historyPayload.entries)) return historyPayload.entries;
    if (historyPayload && Array.isArray(historyPayload.data)) return historyPayload.data;
    return [];
}

function percentile(sortedValues, p) {
    if (!sortedValues.length) return 0;
    const idx = Math.min(sortedValues.length - 1, Math.max(0, Math.floor((p / 100) * sortedValues.length)));
    return sortedValues[idx];
}

function getRiskBand(probability, values, mode) {
    if (mode === "absolute" || values.length < 5) {
        if (probability < 40) return { band: "low", label: "fixed thresholds" };
        if (probability < 70) return { band: "medium", label: "fixed thresholds" };
        return { band: "high", label: "fixed thresholds" };
    }

    const sorted = [...values].sort((a, b) => a - b);
    const p33 = percentile(sorted, 33);
    const p66 = percentile(sorted, 66);

    if (probability <= p33) return { band: "low", label: "relative to recent history" };
    if (probability <= p66) return { band: "medium", label: "relative to recent history" };
    return { band: "high", label: "relative to recent history" };
}

function getBandMode() {
    return localStorage.getItem(STORAGE_KEY) || "relative";
}

function setBandMode(mode) {
    localStorage.setItem(STORAGE_KEY, mode);
}

function resetPreferences() {
    localStorage.removeItem(STORAGE_KEY);
}

function renderChart(labels, values) {
    const chartCanvas = document.getElementById("chart");
    if (window.__riskChart) {
        window.__riskChart.destroy();
    }

    window.__riskChart = new Chart(chartCanvas, {
        type: "line",
        data: {
            labels,
            datasets: [{
                data: values,
                borderWidth: 2,
                tension: 0.35,
            }],
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, max: 100 } },
        },
    });
}

async function load() {
    try {
        const cacheBust = `?v=${Date.now()}`;
        const risk = await fetch(`risk.json${cacheBust}`).then(r => r.json());
        const historyPayload = await fetch(`history_log.json${cacheBust}`).then(r => r.json());
        const build = await fetch(`build_info.json${cacheBust}`).then(r => r.json()).catch(() => null);

        const rows = getHistoryRows(historyPayload);
        const values = rows.map(x => Number(x.probability ?? x.p ?? 0));

        const mode = getBandMode();
        document.getElementById("bandMode").value = mode;

        const probability = Number(risk.probability || 0);
        const band = getRiskBand(probability, values, mode);

        const riskEl = document.getElementById("risk");
        riskEl.innerText = probability.toFixed(2) + "%";
        riskEl.className = "risk " + band.band;

        document.getElementById("updated").innerText = risk.last_updated || "n/a";
        document.getElementById("submeta").innerText = `Color mode: ${band.label} | Trend points: ${rows.length}`;

        const driversEl = document.getElementById("drivers");
        driversEl.innerHTML = "";

        const drivers = Array.isArray(risk.top_drivers) ? risk.top_drivers : [];
        if (drivers.length === 0) {
            driversEl.innerHTML = `<div class="card"><div class="meta">No top drivers found in current run.</div></div>`;
        } else {
            drivers.forEach(driver => {
                driversEl.innerHTML += `
                    <div class="card">
                        <a href="${driver.link}" target="_blank" rel="noopener noreferrer">${driver.title}</a>
                        <div class="meta">
                            ${driver.source || "n/a"} | actors: [${(driver.actors || []).join(", ")}] | class: ${driver.class} | impact: ${driver.impact} | confidence: ${driver.confidence ?? "n/a"}
                        </div>
                    </div>`;
            });
        }

        const labels = rows.map(x => (x.ts || x.t || "").slice(11, 16));
        renderChart(labels, values);

        const debug = risk.debug || {};
        const drops = debug.drop_reasons || {};
        document.getElementById("debug").innerHTML = `
            <div class="meta">event_count: ${debug.event_count ?? "n/a"}</div>
            <div class="meta">classified_count: ${debug.classified_count ?? "n/a"}</div>
            <div class="meta">paired_count: ${debug.paired_count ?? "n/a"}</div>
            <div class="meta">valid_pair_updates: ${debug.valid_pair_updates ?? "n/a"}</div>
            <div class="meta">top_driver_count: ${debug.top_driver_count ?? "n/a"}</div>
            <div class="meta">total_signal: ${debug.total_signal ?? "n/a"}</div>
            <div class="meta">drop_missing_title: ${drops.missing_title ?? 0}</div>
            <div class="meta">drop_no_actor: ${drops.no_actor ?? 0}</div>
            <div class="meta">drop_no_signal: ${drops.no_signal ?? 0}</div>
            <div class="meta">drop_invalid_pair: ${drops.invalid_pair ?? 0}</div>
            <div class="meta">drop_low_confidence: ${drops.low_confidence ?? 0}</div>
            <div class="meta">drop_classifier_error: ${drops.classifier_error ?? 0}</div>
        `;

        document.getElementById("build").innerText = build
            ? `Build: ${build.built_at_utc || "n/a"} | run #${build.run_number || "n/a"} | sha ${String(build.sha || "").slice(0, 7)}`
            : "Build: unavailable";
    } catch (err) {
        document.getElementById("debug").innerHTML = `<div class="meta">UI load error: ${(err && err.message) ? err.message : String(err)}</div>`;
        document.getElementById("drivers").innerHTML = `<div class="card"><div class="meta">Unable to render drivers due to UI load error.</div></div>`;
        document.getElementById("updated").innerText = "load failed";
        document.getElementById("submeta").innerText = "";
        document.getElementById("risk").innerText = "--%";
        document.getElementById("risk").className = "risk";
        document.getElementById("build").innerText = "Build: load failed";
    }
  });
}

document.getElementById("bandMode").addEventListener("change", (event) => {
    setBandMode(event.target.value);
    load();
});

document.getElementById("resetPrefs").addEventListener("click", () => {
    resetPreferences();
    load();
});

load();
</script>
</body>
</html>
