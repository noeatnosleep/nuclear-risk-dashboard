<!DOCTYPE html>
<html>
<head>
    <title>Nuclear Risk Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Global Nuclear Risk</h1>

<h2 id="risk"></h2>
<p id="updated"></p>

<h3>Top Drivers</h3>
<ul id="drivers"></ul>

<script>
fetch('risk.json')
.then(r => r.json())
.then(data => {

    document.getElementById('risk').innerText = data.probability + "%";
    document.getElementById('updated').innerText = "Updated: " + data.last_updated;

    const list = document.getElementById('drivers');
    list.innerHTML = "";

    data.top_drivers.forEach(d => {
        const li = document.createElement('li');

        // clickable title
        if (d.link) {
            const a = document.createElement('a');
            a.href = d.link;
            a.innerText = d.title;
            a.target = "_blank";
            li.appendChild(a);
        } else {
            li.innerText = d.title;
        }

        const meta = document.createElement('div');
        meta.style.fontSize = "0.9em";
        meta.style.color = "gray";
        meta.innerText =
            "source: " + d.source +
            " | actors: [" + d.actors.join(", ") + "]" +
            " | matches: [" + d.matches.join(", ") + "]";

        li.appendChild(document.createElement('br'));
        li.appendChild(meta);

        list.appendChild(li);
    });

});
</script>

</body>
</html>
