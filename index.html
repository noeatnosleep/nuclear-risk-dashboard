<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nuclear Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: system-ui;
    background: #0b1220;
    color: #e5e7eb;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 24px;
}

h1 { text-align: center; }

.risk {
    text-align: center;
    font-size: 4.5rem;
    font-weight: 700;
    margin: 10px 0;
}

.low { color: #22c55e; }
.medium { color: #f59e0b; }
.high { color: #ef4444; }

.updated {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 30px;
}

.section { margin-top: 40px; }

.chart-container {
    background: #111827;
    border-radius: 12px;
    padding: 16px;
    height: 260px;
    position: relative;
}

canvas {
    width: 100% !important;
    height: 100% !important;
}

/* LOADING SPINNER */
.spinner {
    width: 30px;
    height: 30px;
    border: 3px solid #334155;
    border-top: 3px solid #60a5fa;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #64748b;
    font-size: 0.9rem;
}

.card {
    background: #162033;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 12px;
}

.card a {
    color: #60a5fa;
    text-decoration: none;
}

.meta {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-top: 5px;
}

.footer {
    margin-top: 50px;
    text-align: center;
    font-size: 0.8rem;
    color: #64748b;
}
</style>
</head>

<body>
<div class="container">

<h1>Global Nuclear Risk</h1>

<div id="risk" class="risk">--%</div>
<div id="updated" class="updated"></div>

<div class="section">
    <h2>Trend</h2>
    <div class="chart-container">
        <canvas id="chart"></canvas>

        <div id="status" class="status">
            <div class="spinner"></div>
            <div style="margin-top:10px;">Loading…</div>
        </div>
    </div>
</div>

<div class="section">
    <h2>Top Drivers</h2>
    <div id="drivers"></div>
</div>

<div class="footer">
    Signal-based model using global news inputs. Not predictive.
</div>

</div>

<script>
async function load() {
    let risk, hist;

    const status = document.getElementById("status");

    try {
        risk = await fetch("risk.json").then(r=>r.json());
    } catch {
        status.innerHTML = "Failed to load data";
        return;
    }

    try {
        hist = await fetch("history_log.json").then(r=>r.json());
    } catch {
        hist = { data: [] };
    }

    const prob = risk.probability;
    const riskEl = document.getElementById("risk");

    riskEl.innerText = prob + "%";
    riskEl.className = "risk " + (prob<7?"low":prob<15?"medium":"high");

    document.getElementById("updated").innerText = risk.last_updated;

    const d = document.getElementById("drivers");
    d.innerHTML = "";

    risk.top_drivers.forEach(x=>{
        d.innerHTML += `
        <div class="card">
            <a href="${x.link}" target="_blank">${x.title}</a>
            <div class="meta">
                ${x.source} | actors: [${x.actors.join(", ")}] | matches: [${x.matches.join(", ")}]
            </div>
        </div>`;
    });

    if (hist.data && hist.data.length > 1) {
        status.style.display = "none";

        const labels = hist.data.map(x=>x.t.slice(11,16));
        const values = hist.data.map(x=>x.p);

        new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderWidth: 2,
                    tension: 0.35
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins:{legend:{display:false}},
                scales:{y:{beginAtZero:true}}
            }
        });

    } else {
        // NOT loading anymore — waiting for more data
        status.innerHTML = "Waiting for more data points…";
    }
}

load();
</script>

</body>
</html>
