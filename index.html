<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Nuclear Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #f4f7fb;
  --text: #0f172a;
  --muted: #475569;
  --card: #ffffff;
  --border: #d7dfeb;
  --link: #2563eb;
  --low: #16a34a;
  --medium: #d97706;
  --high: #dc2626;
}
html[data-theme="dark"] {
  --bg: #0b1220;
  --text: #e5e7eb;
  --muted: #a5b4c7;
  --card: #162033;
  --border: #2a3950;
  --link: #60a5fa;
  --low: #22c55e;
  --medium: #f59e0b;
  --high: #ef4444;
}
body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background .2s ease, color .2s ease; }
.container { max-width: 980px; margin: auto; padding: 24px; }
.header-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
h1 { margin: 0; font-size: 2.6rem; line-height: 1.1; }
.theme-icon-btn {
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  width: 40px;
  height: 40px;
  border-radius: 10px;
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 18px;
}
.risk { text-align: center; font-size: 4.2rem; font-weight: 700; margin: 14px 0 10px; }
.low { color: var(--low); }
.medium { color: var(--medium); }
.high { color: var(--high); }
.updated, .submeta { text-align: center; color: var(--muted); }
.submeta { font-size: 0.95rem; margin-bottom: 18px; }
.section { margin-top: 38px; }
.chart-container { background: var(--card); border-radius: 12px; padding: 16px; height: 280px; border: 1px solid var(--border); }
.mode-switch { text-align: center; margin-top: 9px; font-size: 0.82rem; color: var(--muted); }
.mode-switch button { background: transparent; color: var(--muted); border: none; margin: 0 8px; cursor: pointer; text-transform: lowercase; }
.mode-switch button.active { color: var(--text); text-decoration: underline; }
.driver-controls { margin-bottom: 10px; font-size: 0.88rem; color: var(--muted); }
.driver-controls select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 3px 7px; }
.card { background: var(--card); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.card a { color: var(--link); text-decoration: none; }
.meta { font-size: 0.84rem; color: var(--muted); margin-top: 7px; }
.footer { margin-top: 42px; text-align: center; font-size: 0.9rem; color: var(--muted); }
.build { margin-top: 10px; font-size: 0.8rem; }
canvas { width: 100% !important; height: 100% !important; }
@media (max-width: 640px) {
  h1 { font-size: 1.9rem; }
  .risk { font-size: 3.2rem; }
  .container { padding: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>Global Nuclear Strike Risk</h1>
    <button id="themeToggle" class="theme-icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
  </div>

  <div id="risk" class="risk">--%</div>
  <div id="updated" class="updated"></div>
  <div id="submeta" class="submeta"></div>

  <div class="section">
    <h2>Risk Trend</h2>
    <div class="chart-container"><canvas id="riskChart"></canvas></div>
    <div class="mode-switch" id="timeModeSwitch">
      <button data-mode="years">years</button> |
      <button data-mode="days" class="active">days</button> |
      <button data-mode="hours">hours</button>
    </div>
  </div>

  <div class="section">
    <h2>Risk Vectors (State Levels Over Time)</h2>
    <div class="chart-container"><canvas id="stateChart"></canvas></div>
  </div>

  <div class="section">
    <h2>Top Drivers</h2>
    <div class="driver-controls">
      sort by:
      <select id="driverSort">
        <option value="severity">severity</option>
        <option value="chronological">chronological</option>
        <option value="confidence">confidence</option>
        <option value="source_weight">source weight</option>
      </select>
    </div>
    <div id="drivers"></div>
  </div>

  <div class="footer">
    Signal-based model using global news inputs. Not predictive financial/safety advice.<br><br>
    Contact: <a href="mailto:noeatnosleep@pm.me" style="color:var(--link);">noeatnosleep@pm.me</a>
    <div id="build" class="build">Build: loading...</div>
  </div>
</div>

<script>
window.__riskChart = null;
window.__stateChart = null;
window.__riskPayload = null;
window.__historyRows = [];
window.__diagnosticsRows = [];
window.__timeMode = "days";
const THEME_KEY = "nuclear-risk-theme";

function getHistoryRows(payload) {
  if (Array.isArray(payload)) return payload;
  if (payload && Array.isArray(payload.entries)) return payload.entries;
  if (payload && Array.isArray(payload.data)) return payload.data;
  return [];
}

function parseUtc(ts) {
  if (!ts) return null;
  const iso = String(ts).replace(" UTC", "Z").replace(" ", "T");
  const d = new Date(iso);
  return Number.isNaN(d.getTime()) ? null : d;
}

function bucketStart(dt, mode) {
  const d = new Date(dt.getTime());
  if (mode === "years") {
    d.setUTCDate(1);
    d.setUTCHours(0, 0, 0, 0);
    return d;
  }
  if (mode === "days") {
    d.setUTCHours(0, 0, 0, 0);
    return d;
  }
  d.setUTCMinutes(0, 0, 0);
  return d;
}

function formatBucketLabel(dt, mode) {
  const y = dt.getUTCFullYear();
  const m = String(dt.getUTCMonth() + 1).padStart(2, "0");
  const day = String(dt.getUTCDate()).padStart(2, "0");
  const hh = String(dt.getUTCHours()).padStart(2, "0");
  if (mode === "years") return `${y}-${m}`;
  if (mode === "days") return `${m}-${day}`;
  return `${m}-${day} ${hh}:00`;
}

function addBucket(dt, mode) {
  const d = new Date(dt.getTime());
  if (mode === "years") {
    d.setUTCMonth(d.getUTCMonth() + 1, 1);
    return d;
  }
  if (mode === "days") {
    d.setUTCDate(d.getUTCDate() + 1);
    return d;
  }
  d.setUTCHours(d.getUTCHours() + 1);
  return d;
}

function rangeForMode(mode, maxDate) {
  const end = bucketStart(maxDate, mode);
  const start = new Date(end.getTime());
  if (mode === "years") start.setUTCMonth(start.getUTCMonth() - 23, 1);
  else if (mode === "days") start.setUTCDate(start.getUTCDate() - 29);
  else start.setUTCHours(start.getUTCHours() - 71);
  return { start, end };
}

function buildTimeline(rows, mode) {
  const dates = rows
    .map(row => parseUtc(row.ts || row.t || ""))
    .filter(Boolean)
    .sort((a, b) => a.getTime() - b.getTime());

  const maxDate = dates.length ? dates[dates.length - 1] : new Date();
  const { start, end } = rangeForMode(mode, maxDate);

  const timeline = [];
  for (let cursor = new Date(start.getTime()); cursor <= end; cursor = addBucket(cursor, mode)) {
    timeline.push(new Date(cursor.getTime()));
  }
  return timeline;
}

function aggregateRows(rows, mode, valueGetter, field = "ts") {
  const bucketValues = new Map();
  rows.forEach(row => {
    const dt = parseUtc(row[field] || "");
    if (!dt) return;
    const value = Number(valueGetter(row));
    if (Number.isNaN(value)) return;
    const bucket = bucketStart(dt, mode).getTime();
    if (!bucketValues.has(bucket)) bucketValues.set(bucket, []);
    bucketValues.get(bucket).push(value);
  });

  const averaged = new Map();
  bucketValues.forEach((values, key) => {
    averaged.set(key, values.reduce((a, b) => a + b, 0) / values.length);
  });
  return averaged;
}

function fixedBand(probability) {
  if (probability < 30) return "low";
  if (probability < 60) return "medium";
  return "high";
}

function renderRiskChart() {
  const timeline = buildTimeline(window.__historyRows, window.__timeMode);
  const aggregates = aggregateRows(window.__historyRows, window.__timeMode, row => Number(row.probability ?? row.p ?? NaN), "ts");

  const labels = timeline.map(dt => formatBucketLabel(dt, window.__timeMode));
  const values = timeline.map(dt => {
    const key = bucketStart(dt, window.__timeMode).getTime();
    return aggregates.has(key) ? aggregates.get(key) : null;
  });

  const canvas = document.getElementById("riskChart");
  if (window.__riskChart) window.__riskChart.destroy();
  window.__riskChart = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data: values,
        borderWidth: 2,
        tension: 0.25,
        spanGaps: true,
        pointRadius: values.map(v => (v === null ? 0 : 2)),
        pointHoverRadius: values.map(v => (v === null ? 0 : 4))
      }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, max: 100 },
        x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12 } }
      }
    }
  });
}

function pickTopStates(latestState) {
  const rows = Object.entries(latestState || {});
  rows.sort((a, b) => b[1] - a[1]);
  return rows.slice(0, 5).map(([key]) => key);
}

function renderStateChart() {
  const rows = Array.isArray(window.__diagnosticsRows) ? window.__diagnosticsRows : [];
  if (!rows.length) return;

  const latestState = rows[rows.length - 1].state || {};
  const keys = pickTopStates(latestState);
  const timeline = buildTimeline(rows.map(r => ({ ts: r.ts })), window.__timeMode);
  const labels = timeline.map(dt => formatBucketLabel(dt, window.__timeMode));

  const datasets = keys.map(key => {
    const aggregates = aggregateRows(rows, window.__timeMode, row => Number((row.state || {})[key]), "ts");
    const data = timeline.map(dt => {
      const bucket = bucketStart(dt, window.__timeMode).getTime();
      return aggregates.has(bucket) ? aggregates.get(bucket) : null;
    });

    return {
      label: key,
      data,
      borderWidth: 2,
      tension: 0.25,
      spanGaps: true,
      pointRadius: data.map(v => (v === null ? 0 : 2)),
      pointHoverRadius: data.map(v => (v === null ? 0 : 4))
    };
  });

  const canvas = document.getElementById("stateChart");
  if (window.__stateChart) window.__stateChart.destroy();
  window.__stateChart = new Chart(canvas, {
    type: "line",
    data: { labels, datasets },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: true } },
      scales: {
        y: { beginAtZero: true, max: 10 },
        x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 12 } }
      }
    }
  });
}

function sortDrivers(drivers, mode) {
  const rows = [...drivers];
  if (mode === "chronological") {
    rows.sort((a, b) => (parseUtc(b.published || "")?.getTime() || 0) - (parseUtc(a.published || "")?.getTime() || 0));
    return rows;
  }
  if (mode === "confidence") {
    rows.sort((a, b) => (b.confidence ?? 0) - (a.confidence ?? 0));
    return rows;
  }
  if (mode === "source_weight") {
    rows.sort((a, b) => (b.source_weight ?? 0) - (a.source_weight ?? 0));
    return rows;
  }
  rows.sort((a, b) => Math.abs(b.impact ?? 0) - Math.abs(a.impact ?? 0));
  return rows;
}

function safeExternalUrl(url) {
  if (!url) return "";
  try {
    const parsed = new URL(url);
    if (parsed.protocol === "http:" || parsed.protocol === "https:") return parsed.toString();
    return "";
  } catch (_) {
    return "";
  }
}

function asText(value, fallback = "n/a") {
  if (value === null || value === undefined) return fallback;
  const text = String(value).trim();
  return text || fallback;
}

function renderDriverCard(container, driver) {
  const card = document.createElement("div");
  card.className = "card";

  const link = document.createElement("a");
  const href = safeExternalUrl(driver.link);
  link.href = href || "#";
  link.textContent = asText(driver.title, "Untitled event");
  if (href) {
    link.target = "_blank";
    link.rel = "noopener noreferrer";
  }

  const metaA = document.createElement("div");
  metaA.className = "meta";
  metaA.textContent = `source: ${asText(driver.source_domain)} | state: ${asText(driver.state_key)} | class: ${asText(driver.class)}`;

  const metaB = document.createElement("div");
  metaB.className = "meta";
  metaB.textContent = `impact: ${asText(driver.impact)} | source_weight: ${asText(driver.source_weight)} | confidence: ${asText(driver.confidence)} | age_hours: ${asText(driver.age_hours)}`;

  card.appendChild(link);
  card.appendChild(metaA);
  card.appendChild(metaB);
  container.appendChild(card);
}

function renderDrivers() {
  const payload = window.__riskPayload || {};
  const sortSelect = document.getElementById("driverSort");
  const drivers = Array.isArray(payload.top_drivers) ? payload.top_drivers : [];
  const sorted = sortDrivers(drivers, sortSelect.value);

  const container = document.getElementById("drivers");
  container.replaceChildren();

  if (!sorted.length) {
    const empty = document.createElement("div");
    empty.className = "card";
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = "No top drivers found in current run.";
    empty.appendChild(meta);
    container.appendChild(empty);
    return;
  }

  sorted.forEach(driver => renderDriverCard(container, driver));
}

function refreshChartsAndDrivers() {
  renderRiskChart();
  renderStateChart();
  renderDrivers();
  document.querySelectorAll("#timeModeSwitch button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === window.__timeMode);
  });
}

function applyTheme(theme) {
  const normalized = theme === "light" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", normalized);
  localStorage.setItem(THEME_KEY, normalized);
  document.getElementById("themeToggle").textContent = normalized === "dark" ? "🌙" : "☀️";
}

async function load() {
  try {
    const bust = `?v=${Date.now()}`;
    const risk = await fetch(`risk.json${bust}`).then(r => r.json());
    const hist = await fetch(`history_log.json${bust}`).then(r => r.json());
    const build = await fetch(`build_info.json${bust}`).then(r => r.json()).catch(() => null);
    const diag = await fetch(`diagnostics_log.json${bust}`).then(r => r.json()).catch(() => []);

    window.__riskPayload = risk;
    window.__historyRows = getHistoryRows(hist);
    window.__diagnosticsRows = Array.isArray(diag) ? diag : [];

    const probability = Number(risk.probability || 0);
    const uncertainty = Number(risk.uncertainty || 0);

    const riskEl = document.getElementById("risk");
    riskEl.innerText = `${probability.toFixed(2)}%`;
    riskEl.className = `risk ${fixedBand(probability)}`;

    document.getElementById("updated").innerText = risk.last_updated || "n/a";
    document.getElementById("submeta").innerText = `Uncertainty: ±${uncertainty.toFixed(2)} | Driver sort: configurable below`;

    document.getElementById("build").innerText = build
      ? `Build: ${build.built_at_utc || "n/a"} | run #${build.run_number || "n/a"} | sha ${String(build.sha || "").slice(0, 7)}`
      : "Build: unavailable";

    refreshChartsAndDrivers();
  } catch (err) {
    document.getElementById("submeta").innerText = `Load error: ${err && err.message ? err.message : String(err)}`;
    document.getElementById("updated").innerText = "load failed";
  }
}

document.querySelectorAll("#timeModeSwitch button").forEach(btn => {
  btn.addEventListener("click", () => {
    window.__timeMode = btn.dataset.mode;
    refreshChartsAndDrivers();
  });
});

document.getElementById("driverSort").addEventListener("change", renderDrivers);

document.getElementById("themeToggle").addEventListener("click", () => {
  const current = document.documentElement.getAttribute("data-theme") || "dark";
  applyTheme(current === "dark" ? "light" : "dark");
});

applyTheme(localStorage.getItem(THEME_KEY) || "dark");
load();
</script>
</body>
</html>
