<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nuclear Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    background: #0b1220;
    color: #e5e7eb;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 24px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.risk {
    text-align: center;
    font-size: 4.5rem;
    font-weight: 700;
    margin: 10px 0;
}

.low { color: #22c55e; }
.medium { color: #f59e0b; }
.high { color: #ef4444; }

.updated {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 30px;
}

.section {
    margin-top: 40px;
}

.card {
    background: #162033;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 14px;
    transition: background 0.2s ease;
}

.card:hover {
    background: #1d2a44;
}

.card a {
    color: #60a5fa;
    font-weight: 500;
    text-decoration: none;
}

.card a:hover {
    text-decoration: underline;
}

.meta {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-top: 6px;
}

canvas {
    margin-top: 10px;
    background: #111827;
    border-radius: 10px;
    padding: 10px;
}

.footer {
    margin-top: 50px;
    text-align: center;
    font-size: 0.8rem;
    color: #64748b;
}
</style>
</head>

<body>
<div class="container">

<h1>Global Nuclear Risk</h1>

<div id="risk" class="risk">--%</div>
<div id="updated" class="updated"></div>

<div class="section">
    <h2>Trend</h2>
    <canvas id="chart"></canvas>
</div>

<div class="section">
    <h2>Top Drivers</h2>
    <div id="drivers"></div>
</div>

<div class="footer">
    Signal-based model using global news inputs. Not predictive.
</div>

</div>

<script>
async function load() {
    let risk, hist;

    try {
        risk = await fetch("risk.json").then(r=>r.json());
    } catch {
        return;
    }

    try {
        hist = await fetch("history_log.json").then(r=>r.json());
    } catch {
        hist = { data: [] };
    }

    const prob = risk.probability;
    const riskEl = document.getElementById("risk");

    riskEl.innerText = prob + "%";
    riskEl.className = "risk " + (prob<7?"low":prob<15?"medium":"high");

    document.getElementById("updated").innerText = risk.last_updated;

    const d = document.getElementById("drivers");
    d.innerHTML = "";

    risk.top_drivers.forEach(x=>{
        const el = document.createElement("div");
        el.className = "card";

        el.innerHTML = `
            <a href="${x.link}" target="_blank">${x.title}</a>
            <div class="meta">
                ${x.source} | actors: [${x.actors.join(", ")}] | matches: [${x.matches.join(", ")}]
            </div>
        `;

        d.appendChild(el);
    });

    if (hist.data && hist.data.length > 1) {
        const labels = hist.data.map(x=>x.t.slice(11,16));
        const values = hist.data.map(x=>x.p);

        new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderWidth: 2,
                    tension: 0.35
                }]
            },
            options: {
                plugins:{legend:{display:false}},
                scales:{
                    y:{beginAtZero:true}
                }
            }
        });
    }
}

load();
</script>

</body>
</html>
