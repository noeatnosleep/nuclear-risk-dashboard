<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nuclear Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: system-ui;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.risk {
    font-size: 4rem;
    font-weight: bold;
}

.low {color:#22c55e;}
.medium {color:#f59e0b;}
.high {color:#ef4444;}

.driver {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

a {color:#60a5fa;}

canvas {
    margin-top:20px;
}
</style>
</head>

<body>
<div class="container">

<h1>Global Nuclear Risk</h1>
<div id="risk" class="risk">--%</div>
<div id="updated"></div>

<h2>Trend</h2>
<canvas id="chart"></canvas>

<h2>Top Drivers</h2>
<div id="drivers"></div>

</div>

<script>
async function load() {
    let risk, hist;

    try {
        risk = await fetch("risk.json").then(r=>r.json());
    } catch {
        return;
    }

    try {
        hist = await fetch("history_log.json").then(r=>r.json());
    } catch {
        hist = { data: [] };
    }

    const prob = risk.probability;
    const riskEl = document.getElementById("risk");

    riskEl.innerText = prob + "%";
    riskEl.className = "risk " + (prob<7?"low":prob<15?"medium":"high");

    document.getElementById("updated").innerText = risk.last_updated;

    const d = document.getElementById("drivers");
    d.innerHTML = "";

    risk.top_drivers.forEach(x=>{
        d.innerHTML += `
        <div class="driver">
            <a href="${x.link}" target="_blank">${x.title}</a>
            <div style="font-size:12px;color:#94a3b8">
                source: ${x.source} |
                actors: [${x.actors.join(", ")}] |
                matches: [${x.matches.join(", ")}]
            </div>
        </div>`;
    });

    if (hist.data && hist.data.length > 1) {
        const labels = hist.data.map(x=>x.t.slice(11,16));
        const values = hist.data.map(x=>x.p);

        new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderWidth: 2,
                    tension: 0.3
                }]
            },
            options: {
                plugins:{legend:{display:false}},
                scales:{y:{beginAtZero:true}}
            }
        });
    }
}

load();
</script>

</body>
</html>
