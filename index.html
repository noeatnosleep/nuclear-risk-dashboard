<!DOCTYPE html>
<html>
<head>
    <title>Nuclear Risk Dashboard</title>
</head>
<body>

<h1>Global Nuclear Risk</h1>

<h2 id="risk"></h2>
<p id="updated"></p>

<h3>Top Drivers</h3>
<ul id="drivers"></ul>

<script>
fetch('risk.json')
.then(r => r.json())
.then(data => {
    document.getElementById('risk').innerText = data.probability + "%";
    document.getElementById('updated').innerText = "Updated: " + data.last_updated;

    const list = document.getElementById('drivers');
    data.top_drivers.forEach(d => {
        const li = document.createElement('li');

        const a = document.createElement('a');
        a.href = d.link;
        a.innerText = d.title;
        a.target = "_blank";

        li.appendChild(a);
        list.appendChild(li);
    });
});
</script>

</body>
</html>
