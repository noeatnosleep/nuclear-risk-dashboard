name: Update Risk

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install feedparser
      - run: python risk.py

      - run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add risk.json
          git commit -m "update" || echo "no changes"
          git push
