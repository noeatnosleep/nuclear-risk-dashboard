name: Update Risk

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Run evaluation benchmark
        run: python tools/evaluate.py

      - name: Run risk pipeline
        run: python risk.py

      - name: Write build info
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone

          payload = {
            "built_at_utc": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC"),
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "sha": "${{ github.sha }}"
          }

          with open("build_info.json", "w", encoding="utf-8") as file_obj:
            json.dump(payload, file_obj, indent=2)
          PY

      - name: Commit and push generated artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add risk.json history_log.json diagnostics_log.json build_info.json evaluation_report.json
          git commit -m "update risk" || exit 0
          git push
