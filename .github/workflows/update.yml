name: Update Risk

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Debug environment
        run: |
          python --version
          pip list

      - name: Run script (verbose)
        run: |
          set -x
          python risk.py

      - name: Show risk.json (if exists)
        run: |
          cat risk.json || echo "risk.json not created"

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add risk.json || true
          git commit -m "update risk" || echo "no changes"
          git push
